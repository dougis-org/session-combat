<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs & Forms</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sc-surface-0);color:var(--sc-fg-1);font-family:var(--sc-font-sans);padding:18px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  label{display:block;font-size:13px;font-weight:600;color:#d1d5db;margin-bottom:6px;}
  input,select,textarea{width:100%;background:#374151;color:#fff;border:1px solid transparent;border-radius:4px;padding:8px 12px;font-size:14px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#3b82f6;}
  .field{margin-bottom:12px;}
  .hint{font-size:11px;color:#9ca3af;margin-top:4px;}
  .error{font-size:12px;color:#fca5a5;background:#7f1d1d;border:1px solid #b91c1c;border-radius:4px;padding:6px 10px;}
</style></head><body>
<div class="grid">
  <div>
    <div class="field"><label>Encounter Name</label><input value="Cragmaw Hideout — Lower Caves"></div>
    <div class="field"><label>Description</label><textarea rows="2">Bugbear lieutenant guards Sildar Hallwinter.</textarea></div>
  </div>
  <div>
    <div class="field"><label>Encounter</label><select><option>Goblin Ambush · 4 monsters</option></select></div>
    <div class="field"><label>HP</label><input value="88" type="number" style="width:80px;display:inline-block"><span style="color:#9ca3af;margin:0 8px;font-size:14px">/</span><input value="88" type="number" style="width:80px;display:inline-block"></div>
    <div class="error">Need at least one character to start combat.</div>
  </div>
</div>
</body></html>
