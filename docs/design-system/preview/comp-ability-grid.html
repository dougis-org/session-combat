<!doctype html>
<html><head><meta charset="utf-8"><title>Ability Score Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sc-surface-0);color:var(--sc-fg-1);font-family:var(--sc-font-sans);padding:18px;}
  .wrap{background:#1f2937;border-radius:8px;padding:16px;}
  .title{font-size:13px;font-weight:700;color:#d1d5db;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .stat{background:#374151;border-radius:4px;padding:10px 6px;text-align:center;}
  .v{font-size:18px;font-weight:700;line-height:1;}
  .m{font-size:12px;color:#9ca3af;margin-top:2px;font-family:var(--sc-font-mono);}
  .ab{font-size:10px;color:#6b7280;margin-top:2px;letter-spacing:.05em;font-weight:700;}
</style></head><body>
<div class="wrap">
  <div class="title">Ability Scores · Adult Red Dragon</div>
  <div class="grid">
    <div class="stat"><div class="v">27</div><div class="m">+8</div><div class="ab">STR</div></div>
    <div class="stat"><div class="v">10</div><div class="m">+0</div><div class="ab">DEX</div></div>
    <div class="stat"><div class="v">25</div><div class="m">+7</div><div class="ab">CON</div></div>
    <div class="stat"><div class="v">16</div><div class="m">+3</div><div class="ab">INT</div></div>
    <div class="stat"><div class="v">13</div><div class="m">+1</div><div class="ab">WIS</div></div>
    <div class="stat"><div class="v">21</div><div class="m">+5</div><div class="ab">CHA</div></div>
  </div>
</div>
</body></html>
