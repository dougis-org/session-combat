<!doctype html>
<html><head><meta charset="utf-8"><title>Pills & Tags</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--sc-surface-0);color:var(--sc-fg-1);font-family:var(--sc-font-sans);padding:20px;}
  h4{margin:0 0 6px 0;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sc-fg-3);font-weight:700;}
  .row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .p{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;color:#fff;letter-spacing:.01em;}
  .p--party{background:#2563eb;} .p--enemy{background:#dc2626;}
  .p--lair{background:#9333ea;} .p--char{background:#1d4ed8;}
  .p--mon{background:#b91c1c;}  .p--lib{background:#7e22ce;}
  .p--init{background:#facc15;color:#0a0a0a;font-family:var(--sc-font-mono);}
  .p--cr{background:#374151;color:#d1d5db;}
  .p--leg{background:#a16207;color:#fef3c7;}
  .p--conc{background:#facc15;color:#0a0a0a;}
  .p--ko{background:#374151;color:#9ca3af;}
</style></head><body>
<h4>Role tags</h4>
<div class="row">
  <span class="p p--party">party</span>
  <span class="p p--enemy">enemy</span>
  <span class="p p--lair">lair</span>
  <span class="p p--char">Character</span>
  <span class="p p--mon">Monster</span>
  <span class="p p--lib">(from library)</span>
</div>
<h4>Combat state</h4>
<div class="row">
  <span class="p p--init">Init 22</span>
  <span class="p p--cr">CR 24</span>
  <span class="p p--leg">Legendary ●●●</span>
  <span class="p p--conc">Concentrating</span>
  <span class="p p--ko">Unconscious</span>
</div>
<h4>Conditions (D&amp;D)</h4>
<div class="row">
  <span class="p" style="background:#7e22ce">Stunned</span>
  <span class="p" style="background:#b91c1c">Poisoned · 3r</span>
  <span class="p" style="background:#1d4ed8">Frightened</span>
  <span class="p" style="background:#854d0e">Prone</span>
  <span class="p" style="background:#0e7490">Restrained</span>
  <span class="p" style="background:#9a3412">Grappled</span>
  <span class="p" style="background:#374151">Invisible</span>
  <span class="p" style="background:#dc2626">Charmed</span>
</div>
</body></html>
