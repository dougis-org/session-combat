<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#111827;color:#fff;font-family:var(--sc-font-sans);padding:18px;}
  .grid{display:grid;grid-template-columns:140px 140px 1fr;gap:24px;align-items:center;}
  .tile{background:#0a0a0a;border:1px solid #1f2937;border-radius:8px;padding:14px;display:flex;align-items:center;justify-content:center;height:130px;}
  .tile.light{background:#f5f5f4;}
  .meta h3{margin:0 0 4px 0;font-size:20px;font-weight:700;}
  .meta p{margin:0 0 8px 0;font-size:13px;color:#9ca3af;line-height:1.45;}
  .meta code{font-family:var(--sc-font-mono);font-size:11px;background:#1f2937;padding:2px 6px;border-radius:3px;color:#d1d5db;}
</style></head><body>
<div class="grid">
  <div class="tile"><img src="../assets/logo.svg" width="100" height="100" alt=""></div>
  <div class="tile light"><img src="../assets/logo.svg" width="100" height="100" alt=""></div>
  <div class="meta">
    <h3>Crossed Swords + Fireball</h3>
    <p>Two steel longswords crossed at 88°, a glowing fireball above the intersection. Reads as combat + magic. Works on dark or light; the steel uses subtle gradients so it never goes flat.</p>
    <p><code>assets/logo.svg</code> · 1000×1000 viewBox · transparent bg</p>
  </div>
</div>
</body></html>
