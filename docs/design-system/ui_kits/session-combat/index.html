<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Session Combat — UI Kit</title>
  <link rel="icon" href="../../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: var(--sc-surface-0);
      color: var(--sc-fg-1);
      font-family: var(--sc-font-sans);
      min-height: 100%;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    #app { flex: 1; }
    /* Top "screen switcher" — only visible in this UI-kit harness, not the real app. */
    .sc-switcher {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,10,.85);
      backdrop-filter: saturate(140%) blur(10px);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--sc-surface-1);
      padding: 8px 18px;
      display: flex; gap: 10px; align-items: center;
      font-size: 12px; color: var(--sc-fg-3);
    }
    .sc-switcher b { color: var(--sc-fg-1); letter-spacing: .04em; }
    .sc-switcher button {
      background: transparent; border: 1px solid var(--sc-border);
      color: var(--sc-fg-2);
      padding: 4px 12px; border-radius: 4px;
      font: inherit; cursor: pointer;
      transition: background-color 120ms;
    }
    .sc-switcher button:hover { background: var(--sc-surface-1); color: #fff; }
    .sc-switcher button.active { background: var(--sc-party-strong); color: #fff; border-color: var(--sc-party-strong); }
  </style>
</head>
<body>
  <!-- React 18 intentional: unpkg does not yet provide React 19 UMD builds compatible with Babel standalone. This harness is design-only; it does not affect the production app. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="MonsterScreen.jsx"></script>

  <div id="app"></div>

  <script type="text/babel">
    const SCREENS = [
      { id: 'login',      label: 'Login' },
      { id: 'home',       label: 'Home' },
      { id: 'encounters', label: 'Encounters' },
      { id: 'monsters',   label: 'Monster' },
      { id: 'combat',     label: 'Combat Tracker' },
    ];

    function App() {
      const initial = window.location.hash.replace('#', '') || 'home';
      const [screen, setScreen] = React.useState(SCREENS.find(s => s.id === initial) ? initial : 'home');
      React.useEffect(() => { window.location.hash = screen; }, [screen]);

      const nav = (id) => setScreen(SCREENS.find(s => s.id === id) ? id : 'home');

      return (
        <div data-screen-label={SCREENS.find(s => s.id === screen)?.label || screen}>
          <div className="sc-switcher">
            <b>SESSION COMBAT · UI KIT</b>
            <span>·</span>
            <span>Click any screen below to explore. Real app routes are mirrored 1:1.</span>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
              {SCREENS.map(s => (
                <button key={s.id}
                  className={s.id === screen ? 'active' : ''}
                  onClick={() => nav(s.id)}>
                  {s.label}
                </button>
              ))}
            </div>
          </div>

          {screen === 'login'      && <LoginScreen      onLogin={() => nav('home')} />}
          {screen === 'home'       && <HomeScreen       onNav={nav}  onLogout={() => nav('login')} />}
          {screen === 'encounters' && <EncountersScreen onBack={() => nav('home')} onOpenCombat={() => nav('combat')} />}
          {screen === 'monsters'   && <MonsterScreen    onBack={() => nav('home')} />}
          {screen === 'combat'     && <CombatScreen     onBack={() => nav('home')} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
