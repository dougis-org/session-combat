      - patterns:
          - pattern-inside: |
              $REQ = $HTTP.getRequestDispatcher(...)
              ...
          - pattern-either:
              - pattern: $REQ.include($FST, $SND)
              - pattern: $REQ.forward($FST, $SND)
    pattern-sources:
      - pattern: "($VAR: javax.servlet.http.HttpServletRequest).getParameter(...)"
