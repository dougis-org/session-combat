    severity: WARNING
    languages:
      - go
  - id: go.gorilla.security.audit.session-cookie-samesitenone.session-cookie-samesitenone
    patterns:
      - pattern-inside: |
          &sessions.Options{
            ...,
            SameSite: http.SameSiteNoneMode,
            ...,
