              import com.mitchellbosecke.pebble.PebbleEngine;
              ...
          - pattern-inside: |
              $C = $T.getTemplate($IN);
              ...
          - pattern-not-inside: |
              $C = $T.getTemplate("...");
              ...
          - pattern: $C.evaluate(...)
