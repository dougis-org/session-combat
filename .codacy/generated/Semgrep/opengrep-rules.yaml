  - id: scala_crypto_rule-CipherPaddingOracle
    languages:
      - scala
    message: >
      This specific mode of CBC with PKCS5Padding is susceptible to padding
      oracle attacks. An

      adversary could potentially decrypt the message if the system exposed the
      difference between

      plaintext with invalid padding or valid padding. The distinction between
      valid and invalid

      padding is usually revealed through distinct error messages being returned
      for each condition.
    metadata:
      category: security
      cwe: CWE-696
      shortDescription: Incorrect Behavior Order
      technology:
        - scala
      security-severity: Medium
    patterns:
      - pattern-inside: javax.crypto.Cipher.getInstance("...")
      - pattern-regex: (/CBC/PKCS5Padding)
      - pattern-not-regex: ^(RSA)/.*
      - pattern-not-regex: ^(ECIES)$
    severity: ERROR
  - id: scala_crypto_rule-WeakTLSProtocol
    languages:
      - scala
    message: >
      A HostnameVerifier that accept any host are often use because of
      certificate

      reuse on many hosts. As a consequence, this is vulnerable to
      Man-in-the-middleattacks

      attacks since the client will trust any certificate.
    metadata:
      category: security
      cwe: CWE-295
      shortDescription: Improper Certificate Validation
      security-severity: Medium
    patterns:
      - pattern-either:
          - pattern: new org.apache.http.impl.client.DefaultHttpClient()
          - pattern: javax.net.ssl.SSLContext.getInstance("SSL")
          - patterns:
              - pattern-inside: |
                  import javax.net.ssl._
                  ...
              - pattern: SSLContext.getInstance("SSL")
    severity: WARNING
  - id: scala_endpoint_rule-UnencryptedSocket
    languages:
      - scala
    message: >
      Beyond using an SSL socket, you need to make sure your use of
      SSLSocketFactory

      does all the appropriate certificate validation checks to make sure you
      are not

      subject to man-in-the-middle attacks. Please read the OWASP Transport
      Layer

      Protection Cheat Sheet for details on how to do this correctly.
    metadata:
      cwe: CWE-319
      shortDescription: Cleartext transmission of sensitive information
      security-severity: Info
      owasp:
        - A3:2017-Sensitive Data Exposure
        - A02:2021-Cryptographic Failures
      category: security
    patterns:
      - pattern: new java.net.Socket(...)
    severity: WARNING
  - id: scala_endpoint_rule-WeakHostNameVerification
    languages:
      - scala
    message: >
      A HostnameVerifier that accept any host are often use because of
      certificate

      reuse on many hosts. As a consequence, this is vulnerable to
      Man-in-the-middle

      attacks since the client will trust any certificate.
    metadata:
      category: security
      cwe: CWE-295
      shortDescription: Improper Certificate Validation
      security-severity: Info
    patterns:
      - pattern-either:
          - patterns:
              - pattern-inside: |
                  class $V extends HostnameVerifier {
                    ...
                  }
              - pattern-either:
                  - pattern: def verify(...) = true
                  - pattern: |
                      def verify(...) = {
                        return true
                      }
          - patterns:
              - pattern-inside: |
                  class $V extends X509TrustManager {
                    ...
                  }
              - pattern-either:
                  - pattern: "def checkClientTrusted(...): Unit = {}"
                  - pattern: "def checkServerTrusted(...): Unit = {}"
                  - pattern: def checkClientTrusted(...) = {}
                  - pattern: def checkServerTrusted(...) = {}
                  - pattern: "def getAcceptedIssuers(): Array[X509Certificate] = null"
                  - pattern: "def getAcceptedIssuers(): Array[X509Certificate] = {}"
    severity: WARNING
  - id: scala_file_rule-FileUploadFileName
    languages:
      - scala
    message: >
      The filename provided by the FileUpload API can be tampered with by the
      client to reference

      unauthorized files. The provided filename should be properly validated to
      ensure it's properly

      structured, contains no unauthorized path characters (e.g., / \), and
      refers to an authorized

      file.
    metadata:
      category: security
      cwe: CWE-22
      shortDescription: Improper limitation of a pathname to a restricted directory
        ('Path Traversal')
      technology:
        - scala
      owasp:
        - A5:2017-Broken Access Control
        - A01:2021-Broken Access Control
      security-severity: Info
    patterns:
      - pattern: |
          def $FUNC (..., $REQ: HttpServletRequest, ... ) = {
            ...
            val $FILES = ($SFU: ServletFileUpload).parseRequest($REQ)
            ...
            for ($FILE <- $FILES.asScala) {
              ...
            }
          }
      - pattern: $ITEM.getName()
    severity: WARNING
  - id: scala_inject_rule-AWSQueryInjection
    languages:
      - scala
    message: >
      Constructing SimpleDB queries containing user input can allow an attacker
      to view unauthorized

      records.
    metadata:
      category: security
      cwe: CWE-943
      shortDescription: Improper Neutralization of Special Elements in Data Query Logic
      technology:
