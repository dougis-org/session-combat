      technology:
        - vuln
      references:
        - https://cwe.mitre.org/data/definitions/489.html
        - https://cwe.mitre.org/data/definitions/779.html
      impact: MEDIUM
      likelihood: LOW
      confidence: HIGH
    message: In addition to debug statements potentially logging data excessively,
      debug statements also contribute to longer transactions and consume Apex
      CPU time even when debug logs are not being captured.
    pattern: System.debug(...)
    paths:
      exclude:
        - "*Test*"
        - "*test*"
  - id: bash.curl.security.curl-eval.curl-eval
    severity: WARNING
    languages:
      - bash
    message: Data is being eval'd from a `curl` command. An attacker with control of
      the server in the `curl` command could inject malicious code into the
      `eval`, resulting in a system comrpomise. Avoid eval'ing untrusted data if
      you can. If you must do this, consider checking the SHA sum of the content
      returned by the server to verify its integrity.
    metadata:
      owasp:
        - A03:2021 - Injection
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically
          Evaluated Code ('Eval Injection')"
      category: security
      technology:
        - bash
        - curl
      confidence: MEDIUM
      references:
        - https://owasp.org/Top10/A03_2021-Injection
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: MEDIUM
    mode: taint
    pattern-sources:
      - pattern: |
          $(curl ...)
      - pattern: |
          `curl ...`
    pattern-sinks:
      - pattern: eval ...
  - id: bash.curl.security.curl-pipe-bash.curl-pipe-bash
    languages:
      - bash
    severity: WARNING
    message: Data is being piped into `bash` from a `curl` command. An attacker with
      control of the server in the `curl` command could inject malicious code
      into the pipe, resulting in a system compromise. Avoid piping untrusted
      data into `bash` or any other shell if you can. If you must do this,
      consider checking the SHA sum of the content returned by the server to
      verify its integrity.
    metadata:
      owasp:
        - A03:2021 - Injection
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically
          Evaluated Code ('Eval Injection')"
      category: security
      technology:
        - bash
        - curl
      confidence: LOW
      references:
        - https://owasp.org/Top10/A03_2021-Injection
      subcategory:
        - audit
      likelihood: LOW
      impact: LOW
    patterns:
      - pattern-either:
          - pattern: curl ... | ... bash ...
