  - id: java_inject_rule-CommandInjection
    languages:
      - java
    mode: taint
    pattern-sources:
      - pattern: (javax.servlet.http.HttpServletRequest $R).$METHOD(...)
      - pattern: (java.util.Scanner $S).$METHOD(...)
      - pattern: (java.util.stream.Stream).$METHOD(...)
