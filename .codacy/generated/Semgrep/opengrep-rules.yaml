    message: "`$POLICY` is missing a `condition` block which scopes users of this
      policy to specific GitHub repositories. Without this, `$POLICY` is open to
      all users on GitHub. Add a `condition` block on the variable
      `token.actions.githubusercontent.com:sub` which scopes it to prevent
      this."
