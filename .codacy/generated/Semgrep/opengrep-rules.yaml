          - patterns:
              - pattern-inside: |
                  func $VAL(..., $GORM *gorm.DB,... ) {
                    ...
                  }
              - pattern-either:
                  - pattern: |
                      $GORM. ... .$METHOD($VALUE)
                  - pattern: |
                      $DB := $GORM. ... .$ANYTHING(...)
                      ...
                      $DB. ... .$METHOD($VALUE)
          - focus-metavariable: $VALUE
          - metavariable-regex:
              metavariable: $METHOD
              regex: ^(Order|Exec|Raw|Group|Having|Distinct|Select|Pluck)$
    pattern-sanitizers:
      - pattern-either:
          - pattern: strconv.Atoi(...)
          - pattern: |
              ($X: bool)
