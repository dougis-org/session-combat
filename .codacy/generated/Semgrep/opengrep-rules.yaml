  - id: go.aws-lambda.security.tainted-sql-string.tainted-sql-string
    languages:
      - go
    severity: ERROR
    message: Detected user input used to manually construct a SQL string. This is
      usually bad practice because manual construction could accidentally result
      in a SQL injection. An attacker could use a SQL injection to steal or
      modify contents of the database. Instead, use a parameterized query which
      is available by default in most database engines. Alternatively, consider
      using an object-relational mapper (ORM) such as Sequelize which will
      protect your queries.
    metadata:
      references:
        - https://owasp.org/www-community/attacks/SQL_Injection
      category: security
      owasp:
        - A01:2017 - Injection
        - A03:2021 - Injection
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL
          Command ('SQL Injection')"
      technology:
        - aws-lambda
      cwe2022-top25: true
      cwe2021-top25: true
      subcategory:
        - vuln
      likelihood: HIGH
      impact: MEDIUM
      confidence: MEDIUM
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  func $HANDLER($CTX $CTXTYPE, $EVENT $TYPE, ...) {...}
                  ...
                  lambda.Start($HANDLER, ...)
              - patterns:
                  - pattern-inside: |
                      func $HANDLER($EVENT $TYPE) {...}
                      ...
                      lambda.Start($HANDLER, ...)
                  - pattern-not-inside: |
                      func $HANDLER($EVENT context.Context) {...}
                      ...
                      lambda.Start($HANDLER, ...)
          - focus-metavariable: $EVENT
    pattern-sinks:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern: |
                      "$SQLSTR" + ...
                  - metavariable-regex:
                      metavariable: $SQLSTR
                      regex: (?i)(\s*select|\s*delete|\s*insert|\s*create|\s*update|\s*alter|\s*drop).*
              - patterns:
                  - pattern-either:
                      - pattern: fmt.Fprintf($F, "$SQLSTR", ...)
                      - pattern: fmt.Sprintf("$SQLSTR", ...)
                      - pattern: fmt.Printf("$SQLSTR", ...)
                  - metavariable-regex:
                      metavariable: $SQLSTR
                      regex: \s*(?i)(select|delete|insert|create|update|alter|drop)\b.*%(v|s|q).*
          - pattern-not-inside: |
              log.$PRINT(...)
    pattern-sanitizers:
      - pattern: strconv.Atoi(...)
  - id: go.gorilla.security.audit.handler-assignment-from-multiple-sources.handler-assignment-from-multiple-sources
    metadata:
      cwe:
        - "CWE-289: Authentication Bypass by Alternate Name"
      category: security
      technology:
        - gorilla
      confidence: MEDIUM
      license: Commons Clause License Condition v1.0[LGPL-2.1-only]
      references:
        - https://cwe.mitre.org/data/definitions/289.html
      subcategory:
        - audit
      impact: MEDIUM
      likelihood: LOW
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-inside: |
              func $HANDLER(..., $R *http.Request, ...) {
                ...
              }
          - focus-metavariable: $R
          - pattern-either:
              - pattern: $R.query
    pattern-sinks:
      - patterns:
          - pattern: |
              $Y, err := store.Get(...)
              ...
              $VAR := $Y.Values[...]
              ...
              $VAR = $R
          - focus-metavariable: $R
      - patterns:
          - pattern: |
              $Y, err := store.Get(...)
              ...
              var $VAR $INT = $Y.Values["..."].($INT)
              ...
              $VAR = $R
          - focus-metavariable: $R
    message: "Variable $VAR is assigned from two different sources: '$Y' and '$R'.
      Make sure this is intended, as this could cause logic bugs if they are
      treated as they are the same object."
    languages:
      - go
    severity: WARNING
  - id: go.gorilla.security.audit.session-cookie-missing-httponly.session-cookie-missing-httponly
    patterns:
      - pattern-not-inside: |
          &sessions.Options{
            ...,
            HttpOnly: true,
            ...,
          }
      - pattern: |
          &sessions.Options{
            ...,
          }
    message: A session cookie was detected without setting the 'HttpOnly' flag. The
      'HttpOnly' flag for cookies instructs the browser to forbid client-side
      scripts from reading the cookie which mitigates XSS attacks. Set the
      'HttpOnly' flag by setting 'HttpOnly' to 'true' in the Options struct.
    metadata:
      cwe:
        - "CWE-1004: Sensitive Cookie Without 'HttpOnly' Flag"
      owasp:
        - A05:2021 - Security Misconfiguration
      references:
        - https://github.com/0c34/govwa/blob/139693e56406b5684d2a6ae22c0af90717e149b8/user/session/session.go#L69
      category: security
      technology:
        - gorilla
      confidence: MEDIUM
      subcategory:
        - audit
      likelihood: LOW
      impact: LOW
    fix-regex:
      regex: (HttpOnly\s*:\s+)false
      replacement: \1true
    severity: WARNING
    languages:
      - go
  - id: go.gorilla.security.audit.session-cookie-missing-secure.session-cookie-missing-secure
    patterns:
      - pattern-not-inside: |
          &sessions.Options{
            ...,
            Secure: true,
            ...,
          }
      - pattern: |
          &sessions.Options{
            ...,
          }
    message: A session cookie was detected without setting the 'Secure' flag. The
      'secure' flag for cookies prevents the client from transmitting the cookie
      over insecure channels such as HTTP. Set the 'Secure' flag by setting
      'Secure' to 'true' in the Options struct.
    metadata:
      cwe:
        - "CWE-614: Sensitive Cookie in HTTPS Session Without 'Secure' Attribute"
      owasp:
        - A05:2021 - Security Misconfiguration
      references:
