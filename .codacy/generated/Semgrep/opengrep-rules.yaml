  - id: python.cryptography.security.insecure-cipher-algorithms-arc4.insecure-cipher-algorithm-arc4
    message: ARC4 (Alleged RC4) is a stream cipher with serious weaknesses in its
      initial stream output.  Its use is strongly discouraged. ARC4 does not use
      mode constructions. Use a strong symmetric cipher such as EAS instead.
      With the `cryptography` package it is recommended to use the `Fernet`
      which is a secure implementation of AES in CBC mode with a 128-bit
      key.  Alternatively, keep using the `Cipher` class from the hazmat
      primitives but use the AES algorithm instead.
    metadata:
