  - id: python.django.security.injection.command.subprocess-injection.subprocess-injection
    languages:
      - python
    mode: taint
    options:
      symbolic_propagation: true
    pattern-sources:
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $REQUEST, ...):
                ...
          - focus-metavariable: $REQUEST
