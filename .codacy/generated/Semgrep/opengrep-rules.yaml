                  - pattern-either:
                      - pattern: new FileInputStream(<... $VAR ...>);
                      - pattern: getClass().getResourceAsStream(<... $VAR ...>)
              - patterns:
                  - pattern-inside: |
                      class $CLZ {
                        String $X = "...";
                        ...
