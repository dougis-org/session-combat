              - pattern: |
                  redirect_to [...]
              - patterns:
                  - pattern: |
                      $MODEL. ... .$M(...)
                      ...
                  - metavariable-regex:
                      metavariable: $MODEL
                      regex: "[A-Z]\\w+"
                  - metavariable-regex:
                      metavariable: $M
                      regex: (all|create|find|find_by|find_by_sql|first|last|new|from|group|having|joins|lock|order|reorder|select|where|take)
              - patterns:
                  - pattern: |
                      params.$UNSAFE_HASH.merge(...,:only_path => true,...)
