      where:
        - metavariable: $IDENTIFIER
          regex: .*oidc-provider/token\.actions\.githubusercontent\.com
      all:
        - inside: |
            data "aws_iam_policy_document" $POLICY {
              ...
            }
        - |
          statement {
            ...
            principals {
              ...
              type = "Federated"
              identifiers = [..., $IDENTIFIER, ...]
            }
          }
        - not: |
            statement {
              ...
              condition {
                ...
                variable = "token.actions.githubusercontent.com:sub"
              }
            }
