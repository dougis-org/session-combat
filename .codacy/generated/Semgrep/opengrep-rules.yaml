  - id: java_file_rule-FileUploadFileName
    languages:
      - java
    message: >
      The filename provided by the FileUpload API can be tampered with

      which could lead to unauthorized access or file inclusion vulnerabilities.

      To mitigate this risk, it is essential to conduct rigorous validation of
      the

      filenames provided by clients. This validation should ensure that the
      filename

      adheres to a predefined structure, is devoid of potentially dangerous
      characters

      (such as forward slashes / and backslashes \), and corresponds to an
      authorized

      file only.

      For example, as a remediation strategy, the application could:

      1. Sanitize Filenames: Create a function to sanitize filenames by removing
         or replacing unauthorized characters, including path traversal sequences (../ or ..\).
      2. Allowlist Validation: Implement a allowlist approach, allowing only
      filenames
         that match a specific pattern or are part of a predefined list.
      3. Use Server-Generated Filenames: Rather than relying on client-provided
      filenames,
         generate unique names server-side for storing files.
      4. Verify File Paths: Ensure files are being saved in the correct,
         intended directory, and prevent redirection to unauthorized directories.
      Example remediation:

      ```
        public class FileUploadHandler {
              protected void doPost(HttpServletRequest request, HttpServletResponse response)
                    throws ServletException, IOException {
                Part filePart = request.getPart("file");
                String fileName = filePart.getSubmittedFileName();
                // removes any path information from the filename
                String sanitizedFileName = sanitizeFileName(fileName);
                if (!isFileNameAllowed(sanitizedFileName)) {
                    throw new SecurityException("Invalid file name");
                }
                // Generate a unique file name for storage
                String storedFileName = UUID.randomUUID().toString() + ".txt";
                Path targetPath = Paths.get("uploads").resolve(storedFileName);
                Files.copy(fileContent, targetPath, StandardCopyOption.REPLACE_EXISTING);
            }
            private String sanitizeFileName(String fileName) {
                return Paths.get(fileName).getFileName().toString();
            }
            private boolean isFileNameAllowed(String fileName) {
                return fileName.matches("[a-zA-Z0-9._-]+");
            }
        }
      ```
    pattern-either:
      - patterns:
          - pattern-inside: >
              $FILES = (ServletFileUpload
              $SFU).parseRequest(($X.servlet.http.HttpServletRequest $REQ));

              ...

              for(FileItem $ITEM : $FILES) {
                ...
              }
          - pattern: $ITEM.getName()
      - pattern: ($X.servlet.http.Part $PART).getSubmittedFileName()
    metadata:
      shortDescription: Improper limitation of a pathname to a restricted directory
        ('Path Traversal')
      cwe: CWE-22
      owasp:
        - A5:2017-Broken Access Control
        - A01:2021-Broken Access Control
      security-severity: Info
      category: security
      technology:
        - java
    severity: WARNING
  - id: java_file_rule-FilenameUtils
    languages:
      - java
    message: >
      The filename provided by the FileUpload API can be tampered with by the
      client to reference

      unauthorized files. The provided filename should be properly validated to
      ensure it's properly

      structured, contains no unauthorized path characters (e.g., / \), and
      refers to an authorized

      file.

      The application was found to take a parameter from user input to construct
      a path name. If an

      unfiltered parameter is passed to this file API, files from an arbitrary
      filesystem location

      could be read. When data from an unstrusted source is untrusted source is
      used to construct

      a file path, an attacker could potentially gain access to restrcited files
      locations outside

      the relevant context.

      For example, if the application tries to access the users profile picture
      based on their user

      name by concatenating the username to the filepath:

      "images/userprofiles/" + username

      The expected result of this would be "images/userprofiles/alice", however
      an attacker could

      use a malicious input such as "../../../etc/passwd" to gain access to
      and/or manipulate

      sensitive information

      Assume all input is malicious. Use an "accept known good" input validation
      strategy.

      Inputs can be sanitized by using the getName() method with concat() method
      to remove the 

      potentially malicious path traversal and limit the scope to a restricted
      directory. Or 

      input can also be sanitized by using resolve() method alongwith
      startsWith() method to 

      verify that the base path of the file is safe and expected.

      Example of limiting path traversal using getName:

      ```

      protected void doPut(HttpServletRequest req, HttpServletResponse resp)
      throws ServletException, IOException {
          String input = req.getHeader("input");
          input = getName(input);
          String safePath = concat(basePath, input);
          // Read the contents of the file
          File file = new File(safePath);
      }

      ```
    metadata:
      category: security
      cwe: CWE-22
      owasp:
        - A5:2017-Broken Access Control
        - A01:2021-Broken Access Control
      shortDescription: Improper limitation of a pathname to a restricted directory
        ('Path Traversal')
      security-severity: Info
      technology:
        - java
    mode: taint
    pattern-sanitizers:
      - pattern: |
          $NAME = org.apache.commons.io.FilenameUtils.getName(...);
          ...
          $SAFE = concat($BASE, $NAME);
      - pattern: |
          $RET $FUN(...){
            ...
            $PATH = $BP.resolve(...);
            ...
            if(!$PATH.startsWith(...)) {
              throw new $EXC(...);
            }
            ...
          }
