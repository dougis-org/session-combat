              - pattern: String.join(..., $INPUT, ...)
              - pattern: (String $STR).concat($INPUT)
              - pattern: $INPUT.concat(...)
              - pattern: new $STRB(..., $INPUT, ...)
        label: CONCAT
        requires: INPUT
