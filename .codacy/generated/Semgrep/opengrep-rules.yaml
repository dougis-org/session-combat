                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.ExecContext($CTX, $QUERY, ...)
                          ...
                      }
                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.Exec($QUERY, ...)
                          ...
                      }
                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.QueryRow($CTX, $QUERY)
                          ...
                      }
                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.QueryRow($QUERY)
                          ...
                      }
                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.QueryContext($CTX, $QUERY)
                          ...
                      }
                  - pattern-inside: |
                      func $FUNC(...) {
                          ...
                          $OBJ.QueryRowContext($CTX, $QUERY, ...)
                          ...
                      }
