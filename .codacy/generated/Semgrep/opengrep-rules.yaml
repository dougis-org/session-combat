  - id: java_xml_rule-XsltTransform
    languages:
      - java
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern-inside: |
                      $FUNC(...,String $VAR, ...) {
                        ...
