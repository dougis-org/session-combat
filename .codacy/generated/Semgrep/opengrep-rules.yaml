          - pattern: |
              import $RAND "$MATH"
          - pattern: |
              import "$MATH"
      - metavariable-regex:
          metavariable: $MATH
          regex: ^(math/rand(\/v[0-9]+)*)$
      - pattern-either:
          - pattern-inside: |
              ...
              rand.$FUNC(...)
          - pattern-inside: |
