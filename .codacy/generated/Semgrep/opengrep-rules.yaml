  - id: apex.lang.security.ncino.encryption.badcrypto.bad-crypto
    min-version: 1.44.0
    severity: ERROR
    languages:
      - apex
    metadata:
      cwe:
        - "CWE-321: Use of Hard-coded Cryptographic Key"
      owasp:
        - A02:2021 - Cryptographic Failures
      impact: HIGH
      likelihood: LOW
      confidence: LOW
      category: security
      subcategory:
        - audit
      technology:
        - salesforce
      references:
        - https://cwe.mitre.org/data/definitions/321.html
    message: The rule makes sure you are using randomly generated IVs and keys for
      Crypto calls. Hard-coding these values greatly compromises the security of
      encrypted data.
    pattern-either:
      - pattern: Blob $IV = Blob.valueOf('$STRING');...Crypto.encrypt($ONE, $TWO, $IV,
          $FOUR);
      - pattern: Blob $IV = Blob.valueOf('$STRING');...Crypto.decrypt($ONE, $TWO, $IV,
          $FOUR);
      - pattern: Blob $KEY = Blob.valueOf('$STRING');...Crypto.encrypt($ONE, $KEY,
          $THREE, $FOUR);
      - pattern: Blob $KEY = Blob.valueOf('$STRING');...Crypto.decrypt($ONE, $KEY,
          $THREE, $FOUR);
    paths:
      exclude:
        - "*Test*"
        - "*test*"
  - id: apex.lang.security.ncino.endpoints.insecurehttprequest.insecure-http-request
    min-version: 1.44.0
    severity: ERROR
    languages:
      - apex
    metadata:
      cwe:
        - "CWE-319: Cleartext Transmission of Sensitive Information"
      impact: MEDIUM
      likelihood: LOW
      confidence: MEDIUM
      category: security
      subcategory:
        - vuln
      technology:
        - salesforce
      references:
        - https://cwe.mitre.org/data/definitions/319.html
    message: The software transmits sensitive or security-critical data in cleartext
      in a communication channel that can be sniffed by unauthorized actors.
    patterns:
      - pattern-regex: http[:][/][/]
      - pattern-not-regex: //.*
      - pattern-not-regex: "[*].*"
    paths:
      exclude:
        - "*Test*"
        - "*test*"
  - id: apex.lang.security.ncino.endpoints.namedcredentialsconstantmatch.named-credentials-constant-match
    min-version: 1.44.0
    mode: taint
    severity: ERROR
    languages:
      - apex
    metadata:
      cwe:
        - "CWE-540: Inclusion of Sensitive Information in Source Code"
      impact: HIGH
      likelihood: LOW
      confidence: HIGH
      category: security
      subcategory:
        - vuln
      technology:
        - salesforce
      references:
        - https://cwe.mitre.org/data/definitions/540.html
    message: Named Credentials (and callout endpoints) should be used instead of
      hard-coding credentials. 1. Hard-coded credentials are hard to maintain
      when mixed in with application code. 2. It is particularly hard to update
      hard-coded credentials when they are used amongst different classes. 3.
      Granting a developer access to the codebase means granting knowledge of
      credentials, and thus keeping a two-level access is not possible. 4. Using
      different credentials for different environments is troublesome and
      error-prone.
    pattern-sources:
      - pattern: ...String $X = 'Authorization';
    pattern-sinks:
      - patterns:
          - pattern: req.setHeader($X, ...);
          - focus-metavariable: $X
  - id: apex.lang.security.ncino.endpoints.namedcredentialsstringmatch.named-credentials-string-match
    min-version: 1.44.0
    severity: ERROR
    languages:
      - apex
    metadata:
      cwe:
        - "CWE-540: Inclusion of Sensitive Information in Source Code"
      impact: HIGH
